# SQS ticket worker: no ports; the poll loop finishes the in-flight message
# before exit (SIGTERM -> asyncio.run teardown after the current iteration).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-worker
  template:
    metadata:
      labels:
        app: ticket-worker
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: ticket-worker
          image: ticket-worker  # overlay/CD pins the immutable sha tag
          envFrom:
            - configMapRef:
                name: ticket-worker-env
            - secretRef:
                name: aws-credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
