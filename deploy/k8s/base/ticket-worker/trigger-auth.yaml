# KEDA TriggerAuthentication for the SQS scaler. Locally the Secret carries the
# floci dummy creds; in production the Secret is materialized from AWS Secrets
# Manager by the External Secrets Operator via IRSA (see deploy/terraform/modules/iam).
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: ticket-worker-aws
spec:
  secretTargetRef:
    - parameter: awsAccessKeyID
      name: aws-credentials
      key: AWS_ACCESS_KEY_ID
    - parameter: awsSecretAccessKey
      name: aws-credentials
      key: AWS_SECRET_ACCESS_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
