# KEDA ScaledObject: AWS SQS scaler on ApproximateNumberOfMessages of the main
# queue. queueLength 5 = target backlog per replica before scaling up.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ticket-worker
spec:
  scaleTargetRef:
    name: ticket-worker
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: ticket-worker-aws
      metadata:
        queueURL: http://floci:4566/000000000000/escalations
        queueLength: "5"
        awsRegion: us-east-1
