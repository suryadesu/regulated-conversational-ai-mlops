# AnalysisTemplate queried between canary steps. Three signals:
# error rate < 2%, p95 latency within the 2s SLO, and the canary-prober's
# eval outcome (gateway_canary_probe_success == 1).
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: gateway-canary
spec:
  metrics:
    - name: error-rate
      interval: 60s
      count: 3
      successCondition: len(result) == 0 || result[0] < 0.02
      failureLimit: 1
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: >
            sum(rate(gateway_request_duration_seconds_count{route="/v1/chat/completions",code=~"5.."}[5m]))
            /
            sum(rate(gateway_request_duration_seconds_count{route="/v1/chat/completions"}[5m]))
    - name: p95-latency
      interval: 60s
      count: 3
      successCondition: len(result) == 0 || result[0] < 2.0
      failureLimit: 1
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: >
            histogram_quantile(0.95,
              sum(rate(gateway_request_duration_seconds_bucket{route="/v1/chat/completions"}[5m])) by (le))
    - name: canary-probe-success
      interval: 60s
      count: 3
      successCondition: len(result) > 0 && result[0] == 1
      failureLimit: 1
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring:9090
          query: gateway_canary_probe_success
