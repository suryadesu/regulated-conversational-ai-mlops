# KEDA ScaledObject on request queue depth. Uses the README's pre-decided
# fallback signal: the gateway-side per-upstream in-flight gauge
# (gateway_upstream_inflight{upstream="model-serving"}) rather than an
# engine-internal metric name, so the same trigger works for llama.cpp locally
# and vLLM in prod. minReplicaCount 0 = scale-to-zero for idle pools; cold
# start is model load (minutes), so prod applies this only off-peak.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: model-serving
spec:
  scaleTargetRef:
    name: model-serving
  minReplicaCount: 0
  maxReplicaCount: 4
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring:9090
        query: sum(gateway_upstream_inflight{upstream="model-serving"})
        threshold: "10"
