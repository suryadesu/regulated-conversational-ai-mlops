# OpenAI-compatible serving Deployment. Local/CI: llama.cpp CPU server with a
# pinned Qwen2.5-0.5B GGUF fetched by an initContainer (URL + sha256) into an
# emptyDir — the image stays generic, the model artifact is pinned. The prod
# overlay swaps in vLLM + GPU resources.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
    spec:
      volumes:
        - name: models
          emptyDir: {}
      initContainers:
        - name: fetch-model
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              URL="https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf"
              OUT=/models/qwen2.5-0.5b-instruct-q4_k_m.gguf
              [ -f "$OUT" ] || curl -fSL "$URL" -o "$OUT"
              sha256sum "$OUT"
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: server
          image: ghcr.io/ggml-org/llama.cpp:server
          args:
            - "-m"
            - "/models/qwen2.5-0.5b-instruct-q4_k_m.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--metrics"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: models
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
