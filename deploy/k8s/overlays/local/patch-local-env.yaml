# Local gateway env: the deterministic provider-stub is the managed provider.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          env:
            - name: GATEWAY_PROVIDER
              value: openai_compat
            - name: GATEWAY_PROVIDER_BASE_URL
              value: http://provider-stub:8080/v1
            - name: GATEWAY_PROMPT_VERSION
              value: v1.0.0
