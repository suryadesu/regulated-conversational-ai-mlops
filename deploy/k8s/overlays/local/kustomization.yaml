# Local (kind) overlay: kind-loaded :local image tags, provider-stub as the
# managed provider, floci on the host (host.docker.internal from kind on
# Docker Desktop), PROMPT_VERSION pinned via the base ConfigMap.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/gateway
  - ../../base/provider-stub
  - ../../base/ticket-worker
  - ../../base/model-serving
  - ../../base/observability
images:
  - name: gateway
    newName: gateway
    newTag: local
  - name: provider-stub
    newName: provider-stub
    newTag: local
  - name: ticket-worker
    newName: ticket-worker
    newTag: local
  - name: evals
    newName: evals
    newTag: local
patches:
  - path: patch-local-env.yaml
    target:
      kind: Rollout
      name: gateway
  - path: patch-local-worker.yaml
    target:
      kind: Deployment
      name: ticket-worker
