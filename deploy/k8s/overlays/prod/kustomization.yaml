# Production overlay: CD pins immutable ghcr.io sha tags via `kustomize edit
# set image`; vLLM + GPU via patch; no provider-stub (real managed provider or
# self-hosted serving only).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/gateway
  - ../../base/ticket-worker
  - ../../base/model-serving
  - ../../base/observability
patches:
  - path: patch-model-serving-gpu.yaml
    target:
      kind: Deployment
      name: model-serving
  - path: patch-prod-env.yaml
    target:
      kind: Rollout
      name: gateway
