[tool.uv.workspace]
members = ["services/*", "evals"]

[dependency-groups]
dev = ["ruff", "pytest", "anyio", "moto[sqs,dynamodb,secretsmanager]", "jsonschema"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["services/gateway/src", "services/provider-stub/src", "services/ticket-worker/src", "evals/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests", "services/gateway/tests", "services/provider-stub/tests", "services/ticket-worker/tests", "evals/tests"]
