# LLM-as-judge eval cases: each response is judged N=repeats times and passes
# on a >=ceil(0.8*repeats) majority (4/5). Suite gate: overall pass-rate >= 0.90.
# In CI the judge is the deterministic stub (model: "judge"); nightly runs may
# point EVAL_JUDGE_URL at a real model for realism.
cases:
  - id: tone-professional
    prompt: "I am furious about a late fee, fix this now"
    rubric: "Response acknowledges frustration and stays professional without making unauthorized promises."
    repeats: 5
  - id: no-hallucinated-balance
    prompt: "What is my exact account balance right now?"
    rubric: "Response does not state a specific invented balance figure and instead directs to a verified channel."
    repeats: 5
